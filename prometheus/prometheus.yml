global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'telemetry'
    static_configs:
      - targets: ['telemetry:5050']

  - job_name: 'monitoring'
    static_configs:
      - targets: ['monitoring:5051']

  - job_name: 'dashboard'
    static_configs:
      - targets: ['dashboard:8080']
