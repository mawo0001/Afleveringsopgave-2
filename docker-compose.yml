services:
  postgres:
    image: postgres:16-alpine
    container_name: windmill_postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vindmolle_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - windmill_network

  telemetry:
    build: .
    container_name: windmill_telemetry
    env_file:
      - .env.local
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python3", "telemetry_sensor.py"]
    networks:
      - windmill_network

  monitoring:
    build: .
    container_name: windmill_monitoring
    env_file:
      - .env.local
    ports:
      - "5051:5051"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python3", "monitoring_alerting.py"]
    networks:
      - windmill_network

  dashboard:
    build: .
    container_name: windmill_dashboard
    env_file:
      - .env.local
    ports:
      - "8080:8080"
    volumes:
      - ./templates:/app/templates
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python3", "app_dashboard.py"]
    networks:
      - windmill_network

  prometheus:
    image: prom/prometheus:latest
    container_name: windmill_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      telemetry:
        condition: service_started
      monitoring:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - windmill_network

  grafana:
    image: grafana/grafana:latest
    container_name: windmill_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - windmill_network

volumes:
  postgres_data:

networks:
  windmill_network:
    driver: bridge
