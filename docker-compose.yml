services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vindmolle
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d vindmolle"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: vindmolle
      DB_USER: admin
      DB_PASSWORD: secret
    ports:
      - "8080:8080"
      - "5050:5050"
      - "5051:5051"
    volumes:
      - ./:/app
    command: ["python3", "main.py"]

volumes:
  postgres_data: