services:
  telemetry:
    build: .
    env_file:
      - .env.local
    ports:
      - "25050:5050"
    command: ["python3", "telemetry_sensor.py"]

  monitoring:
    build: .
    env_file:
      - .env.local
    ports:
      - "25051:5051"
    command: ["python3", "monitoring_alerting.py"]

  dashboard:
    build: .
    env_file:
      - .env.local
    ports:
      - "28080:8080"
    volumes:
      - ./templates:/app/templates
    command: ["python3", "app_dashboard.py"]

  simulator:
    build: .
    env_file:
      - .env.local
    depends_on:
      - telemetry
      - monitoring
    command: ["python3", "simulator.py"]
