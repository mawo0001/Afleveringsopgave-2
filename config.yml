app:
  name: vindmolle-overvaagning
  description: "Windmill monitoring system with PostgreSQL database"

environment:
  development:
    description: "Local development with Docker PostgreSQL"
    env_file: .env.local
  production:
    description: "Production deployment with external PostgreSQL"
    env_file: .env.prod

database:
  postgresql:
    host: "${POSTGRES_HOST}"
    port: "${POSTGRES_PORT}"
    database: "${POSTGRES_DB}"
    username: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"
    ssl: "${POSTGRES_SSL}"
    description: "PostgreSQL database connection"
