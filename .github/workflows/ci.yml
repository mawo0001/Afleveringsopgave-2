name: CI – Vindmølle Overvågning

on:
  push:
    branches: ["main", "ttest-branch"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vindmolle_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: vindmolle_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer afhængigheder
        run: pip install -r requirements.txt pytest

      - name: Initialiser database
        run: psql -h localhost -U postgres -d vindmolle_db -f init-db.sql
        env:
          PGPASSWORD: postgres

      - name: Kør tests
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Byg Docker image
        run: docker build -t vindmolle-app .